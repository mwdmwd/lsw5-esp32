# ----------------------------------------------------------------------------
# lsw5-esp32 example configuration
#
# Portions of this file are adapted from the esphome-deye-inverter project,
# including Deye SG0XLP3 Modbus register mappings, value formats, and related
# sensor definitions.
#
# This file has been modified for the lsw5-esp32 hardware and installation
# model, including pin assignments, UART setup, MQTT inputs, and
# RS-485 support.
#
# See LICENSE in this directory for the Apache License, Version 2.0.
# See NOTICE in this directory for attribution notices.
#
# You are hereby advised that this configuration has a few strange aspects for
# historical reasons, and it will probably require adjustments to make it work
# for your needs.
# ----------------------------------------------------------------------------

substitutions:
  name: inverter
  friendly_name: Inverter
  modbus_controller_id: inverter_modbus_controller

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

  on_boot:
    priority: 100 # after network initialisation
    then:
      - lambda: |-
          #include "soc/gpio_sig_map.h"

          gpio_num_t uart_led_pin = GPIO_NUM_38; // COM LED
          int uart_num = id(inverter_uart).get_hw_serial_number();
          int signal_idx = -1;

          switch(uart_num) {
            case 0: signal_idx = U0TXD_OUT_IDX; break;
            case 1: signal_idx = U1TXD_OUT_IDX; break;
            case 2: signal_idx = U2TXD_OUT_IDX; break;
            default: ESP_LOGE("lambda", "What, UART is not hardware backed!?"); return;
          }

          gpio_reset_pin(uart_led_pin);
          gpio_set_direction(uart_led_pin, GPIO_MODE_OUTPUT);

          esp_rom_gpio_connect_out_signal(uart_led_pin, signal_idx, false, false);

          ESP_LOGI("lambda", "Mirrored UART%d to GPIO %d", uart_num, uart_led_pin);

esp32:
  board: esp32-s3-devkitc1-n16r8
  framework:
    type: esp-idf

psram:
  mode: octal

# Enable logging
logger:
  logs:
    modbus_controller: INFO
    modbus_controller.sensor: INFO
    modbus: INFO
    sensor: INFO

# Enable Home Assistant API
api:
  reboot_timeout: 0s
  encryption:
    key: !secret api.key

ota:
  - platform: esphome
    password: !secret ota.password

wifi:
  ssid: !secret wifi.ssid
  password: !secret wifi.password
  fast_connect: true
  domain: .lan

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Deye"
    password: !secret ap.password

web_server:
  local: true

captive_portal:

mqtt:
  broker: 192.168.1.10
  discovery: false
  reboot_timeout: 1min
  birth_message:
    topic: ${name}/availability
    payload: online
  will_message:
    topic: ${name}/availability
    payload: offline

uart:
  - id: inverter_uart
    baud_rate: 9600
    tx_pin: GPIO17
    rx_pin: GPIO16
  - id: meter_uart
    baud_rate: 9600
    rx_pin: GPIO21
    tx_pin: GPIO48
    flow_control_pin: GPIO47

output:
  - id: net_led_output
    platform: ledc
    pin: GPIO40
    inverted: true
  # - id: com_led_output
  #   platform: ledc
  #   pin: GPIO38
  #   inverted: true
  - id: rdy_led_output
    platform: ledc
    pin: GPIO39
    inverted: true

light:
  - id: net_led
    name: Net indicator
    platform: monochromatic
    output: net_led_output
    state_topic: ${name}/net_led/state
    command_topic: ${name}/net_led/set
  # - id: com_led
  #   name: Com indicator
  #   platform: monochromatic
  #   output: com_led_output
  #   state_topic: ${name}/com_led/state
  #   command_topic: ${name}/com_led/set
  - id: rdy_led
    name: Rdy indicator
    platform: monochromatic
    output: rdy_led_output
    state_topic: ${name}/rdy_led/state
    command_topic: ${name}/rdy_led/set

modbus:
  - id: inverter_modbus
    uart_id: inverter_uart
    role: client
  - id: meter_modbus
    uart_id: meter_uart
    role: server

modbus_controller:
  - id: inverter_modbus_controller
    modbus_id: inverter_modbus
    update_interval: 5s
    address: 1
  - id: meter_modbus_controller
    modbus_id: meter_modbus
    address: 1
    server_registers:
      - address: 12
        value_type: FP32
        read_lambda: !lambda return id(meter_grid_power_ph1).state * 1000; // kW to W
      - address: 14
        value_type: FP32
        read_lambda: !lambda return id(meter_grid_power_ph2).state * 1000; // kW to W
      - address: 16
        value_type: FP32
        read_lambda: !lambda return id(meter_grid_power_ph3).state * 1000; // kW to W
      - address: 72
        value_type: FP32
        read_lambda: !lambda return id(meter_grid_import_kwh).state;
      - address: 74
        value_type: FP32
        read_lambda: !lambda return id(meter_grid_export_kwh).state;
  - id: unk_modbus_controller
    modbus_id: meter_modbus
    address: 0xab # ???
    server_registers:
      - address: 286 # 0x11e
        value_type: FP32
        read_lambda: !lambda ESP_LOGD("modbus", "Read unkreg"); return 0;
        write_lambda: !lambda ESP_LOGD("modbus", "Write unkreg value %f", x); return true;

text_sensor:
  - id: fast_power # not yet used but the goal would be to refresh this at 8 Hz instead of ⅕ Hz
    platform: mqtt_subscribe
    topic: elec/fast_power
    internal: false

sensor:
  - id: meter_grid_power_ph1
    platform: mqtt_subscribe
    topic: elec/ph1/active_power
    unit_of_measurement: kW
    accuracy_decimals: 3
  - id: meter_grid_power_ph2
    platform: mqtt_subscribe
    topic: elec/ph2/active_power
    unit_of_measurement: kW
    accuracy_decimals: 3
  - id: meter_grid_power_ph3
    platform: mqtt_subscribe
    topic: elec/ph3/active_power
    unit_of_measurement: kW
    accuracy_decimals: 3
  - id: meter_grid_import_kwh
    platform: mqtt_subscribe
    topic: elec/forward_active_energy
    unit_of_measurement: kWh
    accuracy_decimals: 3
  - id: meter_grid_export_kwh
    platform: mqtt_subscribe
    topic: elec/reverse_active_energy
    unit_of_measurement: kWh
    accuracy_decimals: 3

  - id: free_heap
    name: Free heap
    platform: template
    lambda: !lambda return esp_get_free_heap_size();
    update_interval: 60s
    unit_of_measurement: "bytes"

  # Start esphome-deye-inverter

  # Basic sensors (old MQTT)

  # Grid voltage
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Grid L1 Voltage"
    id: grid_voltage_l1
    register_type: holding
    address: 598
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"
    state_topic: ${name}/grid_ph1_voltage

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Grid L2 Voltage"
    id: grid_voltage_l2
    register_type: holding
    address: 599
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"
    state_topic: ${name}/grid_ph2_voltage

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Grid L3 Voltage"
    id: grid_voltage_l3
    register_type: holding
    address: 600
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:sine-wave"
    state_topic: ${name}/grid_ph3_voltage

  # Grid current
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Internal CT L1 Current"
    id: internal_ct_l1_current
    register_type: holding
    address: 610 # TODO 630?
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:transmission-tower"
    state_topic: ${name}/grid_ph1_current

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Internal CT L2 Current"
    id: internal_ct_l2_current
    register_type: holding
    address: 611 # TODO 631?
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:transmission-tower"
    state_topic: ${name}/grid_ph2_current

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Internal CT L3 Current"
    id: internal_ct_l3_current
    register_type: holding
    address: 612 # TODO 632?
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:transmission-tower"
    state_topic: ${name}/grid_ph3_current

  # Grid frequency
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Grid Frequency"
    register_type: holding
    address: 609
    unit_of_measurement: "Hz"
    device_class: frequency
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:sine-wave"
    state_topic: ${name}/grid_ph1_frequency

  # PV voltage
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "PV1 Voltage"
    register_type: holding
    address: 676
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:solar-power-variant"
    state_topic: ${name}/pv1_voltage

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "PV2 Voltage"
    register_type: holding
    address: 678
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:solar-power-variant"
    state_topic: ${name}/pv2_voltage

  # PV current
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "PV1 Current"
    register_type: holding
    address: 677
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:solar-power-variant"
    state_topic: ${name}/pv1_current

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "PV2 Current"
    register_type: holding
    address: 679
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:solar-power-variant"
    state_topic: ${name}/pv2_current

  # Generation power
  - platform: template
    name: "PV Power"
    unit_of_measurement: "W"
    id: pv_power
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    update_interval: 5s
    icon: "mdi:solar-power-variant"
    lambda: |-
      auto pv1 = id(pv1_power).state;
      auto pv2 = id(pv2_power).state;
      if(isnan(pv1) || isnan(pv2)) return {};
      return pv1 + pv2;
    state_topic: ${name}/generation_power

  # Energy
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Total PV Production"
    id: total_pv_production
    register_type: holding
    address: 534
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
      - offset: 24161.9
    icon: "mdi:solar-power"
    state_topic: ${name}/generated_energy

  # Temperature
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Temperature"
    register_type: holding
    address: 541
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    value_type: S_WORD
    filters:
      - offset: -1000
      - multiply: 0.1
    icon: "mdi:thermometer"
    state_topic: ${name}/inverter_temperature

  # End basic sensors (old MQTT)

  # Generation power
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "PV1 Power"
    id: pv1_power
    register_type: holding
    address: 672
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:solar-power-variant"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "PV2 Power"
    id: pv2_power
    register_type: holding
    address: 673
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:solar-power-variant"

  # Load power
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L1 Power"
    register_type: holding
    address: 650
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L2 Power"
    register_type: holding
    address: 651
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load L3 Power"
    register_type: holding
    address: 652
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load Power"
    register_type: holding
    address: 653
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"

  # Load UPS power
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load UPS L1 Power"
    register_type: holding
    address: 640
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load UPS L2 Power"
    register_type: holding
    address: 641
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load UPS L3 Power"
    register_type: holding
    address: 642
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"
    disabled_by_default: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Load UPS Power"
    register_type: holding
    address: 643
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:home-lightning-bolt"
    disabled_by_default: true

  # Battery
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Total Battery Charge"
    id: total_battery_charge
    register_type: holding
    address: 516
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:battery-charging-100"
    discovery: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Total Battery Discharge"
    id: total_battery_discharge
    register_type: holding
    address: 518
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:battery-arrow-down"
    discovery: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Temperature"
    register_type: holding
    address: 586
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 0
    value_type: S_WORD
    filters:
      - offset: -1000
      - multiply: 0.1
    icon: "mdi:thermometer"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Voltage"
    id: battery_voltage
    register_type: holding
    address: 587
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:flash"
    discovery: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery SoC"
    register_type: holding
    address: 588
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Power"
    id: battery_power
    register_type: holding
    address: 590
    unit_of_measurement: "W"
    device_class: power
    state_class: "measurement"
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:lightning-bolt"
    discovery: true

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Current"
    register_type: holding
    address: 591
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: S_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Corrected Capacity"
    id: battery_corrected_capacity
    register_type: holding
    address: 592
    unit_of_measurement: "Ah"
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Charging Voltage"
    id: battery_bms_charging_voltage
    register_type: holding
    address: 210
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:flash-triangle"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Discharging Voltage"
    id: battery_bms_discharging_voltage
    register_type: holding
    address: 211
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:flash-triangle-outline"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Charging Current"
    register_type: holding
    address: 212
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Discharging Current"
    register_type: holding
    address: 213
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS SOC"
    register_type: holding
    address: 214
    unit_of_measurement: "%"
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Voltage"
    id: battery_bms_voltage
    register_type: holding
    address: 215
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:sine-wave"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Current"
    register_type: holding
    address: 216
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Max Charging Current"
    register_type: holding
    address: 218
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Max Discharging Current"
    register_type: holding
    address: 219
    unit_of_measurement: "A"
    device_class: current
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:current-dc"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery BMS Other Symbol"
    register_type: holding
    address: 222
    accuracy_decimals: 0
    value_type: U_WORD
    icon: "mdi:battery-unknown"

binary_sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Alarm"
    register_type: holding
    address: 220
    device_class: problem
    entity_category: diagnostic
    icon: "mdi:battery-alert"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Battery Fault"
    register_type: holding
    address: 221
    device_class: problem
    entity_category: diagnostic
    icon: "mdi:battery-alert-variant"
